    .toast-pro-progress{position:absolute;bottom:0;left:0;height:2px;background:var(--neon-red);width:100%}
    @keyframes toastProgress{from{width:100%}to{width:0}}
    .toast-pro:not(.hidden) .toast-pro-progress{animation:toastProgress 3s linear forwards}
